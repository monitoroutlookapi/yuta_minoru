name: Microsoft Login Send Code
on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'
jobs:
  login:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Microsoft Edge
        uses: browser-actions/setup-edge@v1
      - name: Install dependencies
        run: npm install
      - name: Run login script
        env:
          MS_EMAIL: ${{ secrets.MS_EMAIL }}
          MS_PASSWORD: ${{ secrets.MS_PASSWORD }}
          MS_RECOVERY_EMAIL: ${{ secrets.MS_RECOVERY_EMAIL }}
          MAIL_ADDRESS: ${{ secrets.MAIL_ADDRESS }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          TARGET_SUBJECT: "Personal Microsoft account security code"
          DEBUG: pw:api
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" npm run bing
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          if-no-files-found: ignore
          path: "*.png"
