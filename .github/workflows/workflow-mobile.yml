name: Microsoft Login Mobile
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'
jobs:
  login:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Microsoft Edge
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > microsoft.gpg
          sudo install -o root -g root -m 644 microsoft.gpg /etc/apt/trusted.gpg.d/
          sudo sh -c 'echo "deb [arch=amd64] https://packages.microsoft.com/repos/edge stable main" > /etc/apt/sources.list.d/microsoft-edge.list'
          sudo apt-get update
          sudo apt-get install -y microsoft-edge-stable
      - name: Install dependencies
        run: npm install
      - name: Install Playwright browsers
        run: npx playwright install msedge
      - name: Run mobile login script
        env:
          MS_EMAIL: ${{ secrets.MS_EMAIL }}
          MS_PASSWORD: ${{ secrets.MS_PASSWORD }}
          MS_RECOVERY_EMAIL: ${{ secrets.MS_RECOVERY_EMAIL }}
          MAIL_ADDRESS: ${{ secrets.MAIL_ADDRESS }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          TARGET_SUBJECT: "Personal Microsoft account security code"
          DEBUG: pw:api
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" node bing-edge-mobile.js
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-mobile
          path: "*.png"
          if-no-files-found: ignore
